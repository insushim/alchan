name: Scheduled Tasks

on:
  schedule:
    # 주식 시장 업데이트 & 뉴스 생성 - 3분마다 (항상 실행)
    - cron: '*/3 * * * *'

  # 수동 실행 옵션
  workflow_dispatch:

jobs:
  run-scheduled-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tasks to run
        id: tasks
        run: |
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)

          # KST 시간 계산 (UTC + 9)
          KST_HOUR=$(( (HOUR + 9) % 24 ))

          TASKS_ARRAY="["

          # 시장 상황 업데이트 (5분마다)
          if [ $(($MINUTE % 5)) -eq 0 ]; then
            TASKS_ARRAY="${TASKS_ARRAY}\"updateMarketCondition\","
          fi

          # 주식 시장 업데이트 (3분마다 항상 실행)
          TASKS_ARRAY="${TASKS_ARRAY}\"updateCentralStockMarket\",\"autoManageStocks\","

          # 뉴스 생성 (3분마다 항상 실행)
          TASKS_ARRAY="${TASKS_ARRAY}\"createCentralMarketNews\","

          # 뉴스 정리 (3분마다 항상 실행)
          TASKS_ARRAY="${TASKS_ARRAY}\"cleanupExpiredCentralNews\","

          # 일일 작업 리셋 (자정 KST)
          if [ $KST_HOUR -eq 0 ] && [ $MINUTE -lt 10 ]; then
            TASKS_ARRAY="${TASKS_ARRAY}\"resetDailyTasks\","
          fi

          # Remove trailing comma and close array
          if [ "$TASKS_ARRAY" != "[" ]; then
            TASKS_ARRAY="${TASKS_ARRAY%,}]"
          else
            TASKS_ARRAY="[]"
          fi

          echo "tasks<<EOF" >> $GITHUB_OUTPUT
          echo "$TASKS_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "실행할 작업: $TASKS_ARRAY"

      - name: Call Firebase Function
        if: steps.tasks.outputs.tasks != '[]'
        env:
          TASKS_JSON: ${{ steps.tasks.outputs.tasks }}
          PROJECT_ID: inconomysu-class
          AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -d "{\"tasks\": ${TASKS_JSON}}" \
            "https://asia-northeast3-${PROJECT_ID}.cloudfunctions.net/runScheduler"
