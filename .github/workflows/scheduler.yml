name: Scheduled Tasks

on:
  schedule:
    # 15분마다 실행 (주식 가격 + 자정 리셋 + 경제 이벤트 + 주급/보유세 시간 체크)
    - cron: '*/15 * * * *'

  # 수동 실행 (긴급 상황용)
  workflow_dispatch:
    inputs:
      task:
        description: '실행할 작업 (reset, salary, salary-force, rent, property-tax, all, reverse-salary-dry, reverse-salary-commit, cleanup-omok, backfill-salary-dry, backfill-salary-commit)'
        required: true
        default: 'reset'
      weekKey:
        description: 'weekKey (reverse-salary-* / salary-force 에서 사용, 예: 2026-W15)'
        required: false
        default: '2026-W15'

jobs:
  stock-price-update:
    runs-on: ubuntu-latest

    steps:
      - name: Calculate KST time
        id: time
        run: |
          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)
          DAY=$(date -u +%u) # 1=Monday, 7=Sunday

          # KST 시간 계산 (UTC+9) - %-H로 zero-padding 제거 (08/09 octal 버그 방지)
          KST_HOUR=$(( (HOUR + 9) % 24 ))
          if [ $HOUR -ge 15 ]; then
            KST_DAY=$(( (DAY % 7) + 1 ))
          else
            KST_DAY=$DAY
          fi

          echo "kst_hour=$KST_HOUR" >> $GITHUB_OUTPUT
          echo "kst_day=$KST_DAY" >> $GITHUB_OUTPUT
          echo "minute=$MINUTE" >> $GITHUB_OUTPUT
          echo "KST Time: ${KST_HOUR}:${MINUTE} (Day: ${KST_DAY})"

      # 주식 가격 업데이트 (평일 6~25시 KST) - 자동 스케줄일 때만
      - name: Update stock prices
        continue-on-error: true
        if: |
          github.event_name == 'schedule' &&
          steps.time.outputs.kst_day >= 1 && steps.time.outputs.kst_day <= 5 &&
          (steps.time.outputs.kst_hour >= 6 || steps.time.outputs.kst_hour < 1)
        run: |
          echo "Calling stockPriceScheduler..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://stockpricescheduler-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&force=false")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 자정 리셋 (매일 KST 0시 - 함수 내부 중복 방지로 안전)
      - name: Midnight reset
        continue-on-error: true
        if: |
          steps.time.outputs.kst_hour == 0 ||
          (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.task == 'reset' || github.event.inputs.task == 'all'))
        run: |
          echo "Calling midnightReset..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://midnightreset-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"

      # 주급 지급 (월요일 KST 8~9시 - 함수 내부에서 중복 방지)
      # continue-on-error: 실패해도 이후 재산세/월세/경제이벤트는 정상 실행
      - name: Weekly salary payment
        continue-on-error: true
        if: |
          (steps.time.outputs.kst_day == 1 &&
          steps.time.outputs.kst_hour >= 8 && steps.time.outputs.kst_hour <= 9) ||
          (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.task == 'salary' || github.event.inputs.task == 'all'))
        run: |
          echo "💰 주급 지급 시작 (월요일 8:30 KST)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ 주급 지급 응답 비정상 (HTTP $HTTP_STATUS) - 다음 스텝 계속 진행"
          else
            echo "✅ 주급 지급 완료"
          fi

      # 부동산 보유세 징수 (금요일 KST 8~9시 - 함수 내부 주간 중복 방지)
      - name: Property holding tax
        continue-on-error: true
        if: |
          (steps.time.outputs.kst_day == 5 &&
          steps.time.outputs.kst_hour >= 8 && steps.time.outputs.kst_hour <= 9) ||
          (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.task == 'property-tax' || github.event.inputs.task == 'all'))
        run: |
          echo "Calling weeklyPropertyTax..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklypropertytax-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"

      # 월세 징수 (금요일 KST 8시 30분 - 보유세와 같은 날)
      - name: Weekly rent collection
        continue-on-error: true
        if: |
          (steps.time.outputs.kst_day == 5 &&
          steps.time.outputs.kst_hour == 8 && steps.time.outputs.minute >= 15 && steps.time.outputs.minute <= 45) ||
          (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.task == 'rent' || github.event.inputs.task == 'all'))
        run: |
          echo "🏠 월세 징수 시작 (금요일 8:30 KST)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklyrent-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ 월세 징수 응답 비정상 (HTTP $HTTP_STATUS) - 다음 스텝 계속 진행"
          else
            echo "✅ 월세 징수 완료"
          fi

      # 💰 주급 강제 재지급 (weekKey override + force=true) - 미지급 주 복구용
      - name: Weekly salary force re-pay
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'salary-force'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "💰 주급 강제 재지급 (weekKey=$WK, force=true)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&force=true&weekKey=$WK")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 🔁 주급 기록 소급 백필 - dry run
      - name: Backfill salary logs (dry run)
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'backfill-salary-dry'
        run: |
          echo "🔁 주급 기록 소급 백필 DRY RUN"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://backfillsalarylogs-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&dryRun=true")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 🔁 주급 기록 소급 백필 - 실제 실행
      - name: Backfill salary logs (commit)
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'backfill-salary-commit'
        run: |
          echo "🔁 주급 기록 소급 백필 COMMIT"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://backfillsalarylogs-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&dryRun=false&confirm=YES")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 🚨 주급 회수 - dry run (계산만, 쓰기 없음)
      - name: Reverse salary (dry run)
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'reverse-salary-dry'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "🧮 주급 회수 DRY RUN (weekKey=$WK)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://reverselastweeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&weekKey=$WK&dryRun=true")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 🧹 유령 오목 방 정리
      - name: Cleanup stale omok games
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'cleanup-omok'
        run: |
          echo "🧹 유령 오목 방 정리 시작"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://cleanupstaleomokgames-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 🚨 주급 회수 - 실제 실행 (쓰기)
      - name: Reverse salary (commit)
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.task == 'reverse-salary-commit'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "💀 주급 회수 COMMIT (weekKey=$WK)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://reverselastweeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&weekKey=$WK&dryRun=false&confirm=YES")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # 경제 이벤트 (평일 KST 8~17시, 매 15분마다 호출 - 함수 내부에서 triggerHour ±29분 매칭 + 중복 방지)
      # workflow_dispatch로 수동 태스크(cleanup-omok, reverse-salary 등) 돌릴 때는 실행 안 함 → 의도치 않은 이벤트 생성 방지
      - name: Economic event
        continue-on-error: true
        if: |
          github.event_name == 'schedule' &&
          steps.time.outputs.kst_day >= 1 && steps.time.outputs.kst_day <= 5 &&
          steps.time.outputs.kst_hour >= 8 && steps.time.outputs.kst_hour <= 17
        run: |
          echo "Calling economicEventScheduler..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://economiceventscheduler-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"
