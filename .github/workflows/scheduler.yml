name: Scheduled Tasks (Manual Only)

# рҹ”Ҙ лӘЁл“  мһҗлҸҷ мҠӨмјҖмӨ„мқҖ Firebase Cloud Scheduler V2лЎң мқҙм „ мҷ„лЈҢ
# - stockPriceSchedulerV2: 5л¶„л§ҲлӢӨ мЈјмӢқ к°ҖкІ©
# - weeklyEconomySchedulerV2: мӣ”В·кёҲ мЈјкёү/мӣ”м„ё/мһ¬мӮ°м„ё
# - hourlySchedulerV2: л§ӨмӢңк°„ мһҗм •лҰ¬м…Ӣ/кІҪм ңмқҙлІӨнҠё/нҷҳмңЁ
# GHAлҠ” мҲҳлҸҷ dispatch м „мҡ©мңјлЎңл§Ң мң м§Җ (к°•м ң мһ¬м§Җкёү, нҡҢмҲҳ, л°ұн•„ л“ұ)

on:
  # мҲҳлҸҷ мӢӨн–ү (кёҙкёү мғҒнҷ©мҡ©)
  workflow_dispatch:
    inputs:
      task:
        description: 'мӢӨн–үн•  мһ‘м—… (stock, reset, salary, salary-force, rent, property-tax, economic-event, all, reverse-salary-dry, reverse-salary-commit, cleanup-omok, backfill-salary-dry, backfill-salary-commit, recover-teachers, init-classroom)'
        required: true
        default: 'reset'
      weekKey:
        description: 'weekKey (reverse-salary-* / salary-force м—җм„ң мӮ¬мҡ©, мҳҲ: 2026-W15) / init-classroomмқҳ classCode мһ…л Ҙм—җлҸ„ мӮ¬мҡ© (мҳҲ: 6ZVKV3)'
        required: false
        default: '2026-W15'

jobs:
  manual-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Calculate KST time
        id: time
        run: |
          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)
          DAY=$(date -u +%u) # 1=Monday, 7=Sunday

          # KST мӢңк°„ кі„мӮ° (UTC+9)
          KST_HOUR=$(( (HOUR + 9) % 24 ))
          if [ $HOUR -ge 15 ]; then
            KST_DAY=$(( (DAY % 7) + 1 ))
          else
            KST_DAY=$DAY
          fi

          echo "kst_hour=$KST_HOUR" >> $GITHUB_OUTPUT
          echo "kst_day=$KST_DAY" >> $GITHUB_OUTPUT
          echo "minute=$MINUTE" >> $GITHUB_OUTPUT
          echo "KST Time: ${KST_HOUR}:${MINUTE} (Day: ${KST_DAY})"

      # мЈјмӢқ к°ҖкІ© м—…лҚ°мқҙнҠё (мҲҳлҸҷ)
      - name: Update stock prices
        continue-on-error: true
        if: |
          github.event.inputs.task == 'stock' || github.event.inputs.task == 'all'
        run: |
          echo "Calling stockPriceScheduler..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://stockpricescheduler-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&force=false")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # мһҗм • лҰ¬м…Ӣ (мҲҳлҸҷ)
      - name: Midnight reset
        continue-on-error: true
        if: |
          github.event.inputs.task == 'reset' || github.event.inputs.task == 'all'
        run: |
          echo "Calling midnightReset..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://midnightreset-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"

      # мЈјкёү м§Җкёү (мҲҳлҸҷ)
      - name: Weekly salary payment
        continue-on-error: true
        if: |
          github.event.inputs.task == 'salary' || github.event.inputs.task == 'all'
        run: |
          echo "рҹ’° мЈјкёү м§Җкёү мӢңмһ‘"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # л¶ҖлҸҷмӮ° ліҙмң м„ё м§•мҲҳ (мҲҳлҸҷ)
      - name: Property holding tax
        continue-on-error: true
        if: |
          github.event.inputs.task == 'property-tax' || github.event.inputs.task == 'all'
        run: |
          echo "Calling weeklyPropertyTax..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklypropertytax-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"

      # мӣ”м„ё м§•мҲҳ (мҲҳлҸҷ)
      - name: Weekly rent collection
        continue-on-error: true
        if: |
          github.event.inputs.task == 'rent' || github.event.inputs.task == 'all'
        run: |
          echo "рҹҸ  мӣ”м„ё м§•мҲҳ мӢңмһ‘"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklyrent-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹ’° мЈјкёү к°•м ң мһ¬м§Җкёү (weekKey override + force=true)
      - name: Weekly salary force re-pay
        continue-on-error: true
        if: github.event.inputs.task == 'salary-force'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "рҹ’° мЈјкёү к°•м ң мһ¬м§Җкёү (weekKey=$WK, force=true)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://weeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&force=true&weekKey=$WK")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹ”Ғ мЈјкёү кё°лЎқ мҶҢкёү л°ұн•„ - dry run
      - name: Backfill salary logs (dry run)
        continue-on-error: true
        if: github.event.inputs.task == 'backfill-salary-dry'
        run: |
          echo "рҹ”Ғ мЈјкёү кё°лЎқ мҶҢкёү л°ұн•„ DRY RUN"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://backfillsalarylogs-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&dryRun=true")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹ”Ғ мЈјкёү кё°лЎқ мҶҢкёү л°ұн•„ - мӢӨм ң мӢӨн–ү
      - name: Backfill salary logs (commit)
        continue-on-error: true
        if: github.event.inputs.task == 'backfill-salary-commit'
        run: |
          echo "рҹ”Ғ мЈјкёү кё°лЎқ мҶҢкёү л°ұн•„ COMMIT"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://backfillsalarylogs-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&dryRun=false&confirm=YES")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹҡЁ мЈјкёү нҡҢмҲҳ - dry run
      - name: Reverse salary (dry run)
        continue-on-error: true
        if: github.event.inputs.task == 'reverse-salary-dry'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "рҹ§® мЈјкёү нҡҢмҲҳ DRY RUN (weekKey=$WK)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://reverselastweeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&weekKey=$WK&dryRun=true")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹ§№ мң л № мҳӨлӘ© л°© м •лҰ¬
      - name: Cleanup stale omok games
        continue-on-error: true
        if: github.event.inputs.task == 'cleanup-omok'
        run: |
          echo "рҹ§№ мң л № мҳӨлӘ© л°© м •лҰ¬ мӢңмһ‘"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://cleanupstaleomokgames-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹҡЁ мЈјкёү нҡҢмҲҳ - мӢӨм ң мӢӨн–ү
      - name: Reverse salary (commit)
        continue-on-error: true
        if: github.event.inputs.task == 'reverse-salary-commit'
        run: |
          WK="${{ github.event.inputs.weekKey }}"
          echo "рҹ’Җ мЈјкёү нҡҢмҲҳ COMMIT (weekKey=$WK)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://reverselastweeklysalary-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}&weekKey=$WK&dryRun=false&confirm=YES")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹҸ« н•ҷкёү л¶Җк°Җ лҚ°мқҙн„° л°ұн•„ (м§Ғм—…/мғҒм җ/мқҖн–ү/кёүм—¬) вҖ” weekKeyм—җ classCode мһ…л Ҙ
      - name: Initialize classroom defaults
        continue-on-error: true
        if: github.event.inputs.task == 'init-classroom'
        run: |
          CC="${{ github.event.inputs.weekKey }}"
          echo "рҹҸ« н•ҷкёү мҙҲкё°нҷ” мӢңмһ‘ вҖ” classCode=$CC"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://asia-northeast3-inconomysu-class.cloudfunctions.net/initializeClassroomManual?auth=${{ secrets.SCHEDULER_AUTH_TOKEN }}&classCode=$CC")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # рҹ”„ мһҳлӘ» к°Җмһ…лҗң м„ мғқлӢҳ кі„м • ліөкө¬ (мҲҳлҸҷ, 1нҡҢм„ұ)
      - name: Recover teacher accounts
        continue-on-error: true
        if: github.event.inputs.task == 'recover-teachers'
        run: |
          echo "рҹ”„ м„ мғқлӢҳ кі„м • ліөкө¬ мӢңмһ‘"
          FORCE_QUERY=""
          if [ "${{ github.event.inputs.weekKey }}" = "force" ]; then
            FORCE_QUERY="&force=1"
            echo "вҶ» force=1: н”Ңлһҳк·ё лҰ¬м…Ӣ нӣ„ мһ¬мӢӨн–ү"
          fi
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://asia-northeast3-inconomysu-class.cloudfunctions.net/recoverTeachersManual?auth=${{ secrets.SCHEDULER_AUTH_TOKEN }}${FORCE_QUERY}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      # кІҪм ң мқҙлІӨнҠё (мҲҳлҸҷ)
      - name: Economic event
        continue-on-error: true
        if: |
          github.event.inputs.task == 'economic-event' || github.event.inputs.task == 'all'
        run: |
          echo "Calling economicEventScheduler..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://economiceventscheduler-j7kazbsvxq-du.a.run.app?token=${{ secrets.SCHEDULER_AUTH_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')"
