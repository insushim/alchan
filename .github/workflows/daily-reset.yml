name: Daily Task Reset (일일 할일 리셋)

on:
  # 매일 자정(한국 시간 00:00)에 실행 - UTC 15:00
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = 한국 시간 00:00 (다음날)

  # 수동 실행 가능
  workflow_dispatch:

jobs:
  reset-daily-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Daily Task Reset
        run: |
          echo "🔄 일일 할일 리셋 시작"
          echo "실행 시간 (UTC): $(date -u)"
          echo "실행 시간 (한국): $(TZ=Asia/Seoul date)"

          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SCHEDULER_AUTH_TOKEN }}" \
            -d '{"tasks": ["resetDaily"]}' \
            https://asia-northeast3-inconomysu-class.cloudfunctions.net/runScheduler \
            || echo "⚠️ 할일 리셋 실패"

      - name: Log completion
        if: always()
        run: |
          echo "✅ 일일 할일 리셋 완료"
          echo "다음 실행 시간: 내일 자정 (한국 시간)"
