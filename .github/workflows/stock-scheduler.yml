name: Stock Market Scheduler

on:
  # 5분마다 주식 가격 업데이트 + 뉴스 생성 + 뉴스 정리
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      tasks:
        description: '실행할 작업 (쉼표로 구분: updateStocks, createNews, manageStocks, cleanupNews)'
        required: false
        default: 'updateStocks,createNews,cleanupNews'

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Update Stock Prices and Create News
        run: |
          TASKS="${{ github.event.inputs.tasks || 'updateStocks,createNews,cleanupNews' }}"

          echo "🚀 실행할 작업: $TASKS"

          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SCHEDULER_AUTH_TOKEN }}" \
            -d "{\"tasks\": [\"${TASKS//,/\",\"}\"]}" \
            https://asia-northeast3-inconomysu-class.cloudfunctions.net/runScheduler \
            || echo "⚠️ 스케줄러 호출 실패"

      - name: Log completion
        if: always()
        run: |
          echo "✅ 주식 시장 업데이트 완료"
          echo "실행 시간: $(date)"
