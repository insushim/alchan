name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
    paths:
      - 'build/**'  # build 폴더가 변경될 때만 배포

  # 수동 실행 옵션
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub Releases 생성 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if build folder exists
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build folder not found. Please run 'npm run build' locally first."
            exit 1
          fi

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project inconomysu-class --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

      # GitHub Release 생성 (AppUpdateChecker가 감지)
      - name: Set version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # 멀티라인 커밋 메시지를 파일로 저장
          git log -1 --pretty=%s > /tmp/commit_subject.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## 알찬 v${{ steps.version.outputs.version }}

            ### 사용 방법
            - **웹**: [알찬 웹앱](https://inconomysu-class.web.app) 접속 (자동 최신 버전)
            - **Android**: APK 다운로드 후 설치 (별도 빌드 시 첨부)
            - **iOS**: Safari에서 웹앱 접속 → 공유 → 홈 화면에 추가

            빌드: #${{ github.run_number }} | 커밋: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
